apiVersion: apps/v1
kind: Deployment
metadata:
  name: charemma-web
  labels:
    app: charemma-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: charemma-web
  template:
    metadata:
      labels:
        app: charemma-web
    spec:
      containers:
        - name: charemma-web
          image: ghcr.io/charemma/charemma-web:sha-465a9d4 # updated automatically by CI
          ports:
            - containerPort: 80
